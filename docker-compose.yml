services:
  db:
    image: mysql:8.4

    environment:
      # Inject the password and database name from .env
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .

    depends_on:
      db:
        condition: service_healthy

    environment:
      # Inject the database URL directly into your API container
      DATABASE_URL: ${DATABASE_URL}

    ports:
      - "8000:8000"